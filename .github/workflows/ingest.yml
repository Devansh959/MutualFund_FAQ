name: Daily Mutual Fund Data Ingestion

on:
  schedule:
    # 9:15 AM IST is 3:45 AM UTC
    - cron: "45 3 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for pushing changes back to the repo
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Resolve Node.js 20 deprecation warning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CHROMA_PATH: ./data/vector_db
          COLLECTION_NAME: mf_faq_collection
          EMBEDDING_MODEL_NAME: BAAI/bge-base-en-v1.5
        run: |
          python src/ingestion/run_ingest.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Automated data refresh: $(date)" || echo "No changes to commit"
          git push
