name: Daily Mutual Fund Data Ingestion

on:
  schedule:
    # 9:15 AM IST is 3:45 AM UTC
    - cron: "45 3 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CHROMA_CLOUD_HOST: ${{ secrets.CHROMA_CLOUD_HOST }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          COLLECTION_NAME: ${{ secrets.COLLECTION_NAME }}
          EMBEDDING_MODEL_NAME: ${{ secrets.EMBEDDING_MODEL_NAME }}
        run: |
          echo "Starting Scraper..."
          python src/ingestion/scraper.py
          echo "Starting Processor..."
          python src/ingestion/processor.py
          echo "Starting Embedder..."
          python src/ingestion/embedder.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Automated data refresh: $(date)" || echo "No changes to commit"
          git push
